<!DOCTYPE html>
{% extends 'library/base.html' %}
{% block content %}
<h1>Welcome to Bookstore</h1>
<div class="row">
{% for book in books %}
<div class="col-md-3">
<div class="card">
  {% if book.cover_image %}<img src="{{ book.cover_image.url }}" class="card-img-top">{% endif %}
  <div class="card-body">
    <h5 class="card-title">{{ book.title }}</h5>
    <p class="card-text">{{ book.author }}</p>
    <a href="{% url 'book_detail' book.pk %}" class="btn btn-primary">View</a>
  </div>
</div>
</div>
{% endfor %}
</div>
{% endblock %}
